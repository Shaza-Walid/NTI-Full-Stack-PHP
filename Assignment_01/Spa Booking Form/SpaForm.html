<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Anime List</title>
        <link rel="stylesheet" href="styles.css">
        <!-- Add the Google Fonts link for "Space Grotesk" -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    </head>

    <body>

        <div class="container">

            <!-- Left Side -->
            <div class="left">
                <img src="spa.jpg" alt="Spa">
            </div>

            <!-- Right Side -->
            <div class="right">
                <h1>Luxury Spa Booking Form</h1>
                <hr>
                <form action="" method="GET">
                    <div class="row">
                        <label>Booking Date</label>
                        <input type="date">
                    </div>
                    <div class="row">
                        <label>Preferred Time</label>
                        <input type="time">
                    </div>
                    <div class="row">
                        <label>Full Name</label>
                        <div class="inline">
                            <input type="text" placeholder="First Name">
                            <input type="text" placeholder="Last Name">
                        </div>
                    </div>
                    <div class="row">
                        <label>Gender</label>
                        <div class="inline">
                            <input type="radio" name="gender"> Male
                            <input type="radio" name="gender"> Female
                        </div>
                    </div>
                    <div class="row">
                        <label>Phone</label>
                        <input type="text" placeholder="Phone Number">
                    </div>
                    <div class="row">
                        <label>Location</label>
                        <div class="inline">
                            <input type="state" placeholder="State">
                            <input type="text" placeholder="City">
                        </div>
                    </div>
                    <div class="row">
                        <label>Special Request</label>
                        <textarea></textarea>
                    </div>
                    <div class="row">
                        <label>Spa Services</label>
                        <div class="inline">
                            <p>Select your preferred services</p>
                            <input type="checkbox"> Swedish Massage <br>
                            <input type="checkbox"> Facial Treatment <br>
                            <input type="checkbox"> Hot Stone Massage <br>
                            <input type="checkbox"> Aromatherapy <br>
                            <input type="checkbox"> Body Scrub <br>
                        </div>
                    </div>
                    <button type="submit">Book Now</button>
                </form>
            </div>
        </div>

    </body>
</html>
